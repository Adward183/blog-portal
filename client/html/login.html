<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlogPortal - Вход</title>
    <link rel="stylesheet" href="/client/css/login.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo">
                <span class="logo-text"><span style="color: rgb(49, 142, 255);">Blog</span> Portal</span>
            </a>
        </div>
    </header>

    <div class="auth-page">
        <div class="auth-box">
            <span class="auth-title">Войти в аккаунт</span>
            <p class="auth-subtitle">Рады видеть вас снова</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="Введите email" required>
                </div>
            
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" placeholder="Введите пароль" required>
                </div>
            
                <button type="submit" class="btn-submit">Войти</button>
            
                <p class="auth-link">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
            </form>
        </div>
    </div>

    <footer>
        <p>© 2026 Blog Portal. Все права защищены.</p>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
</body>
</html>
