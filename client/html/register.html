<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlogPortal - Регистрация</title>
    <link rel="stylesheet" href="/client/css/register.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo">
                <span class="logo-text"><span style="color: rgb(49, 142, 255);">Blog</span> Portal</span>
            </a>
        </div>
    </header>

    <div class="auth-page">
        <div class="auth-box">
            <span class="auth-title">Регистрация</span>
            <p class="auth-subtitle">Создайте аккаунт, чтобы читать и комментировать статьи</p>
            
    <form id="register-form">
        <div class="form-group">
            <label>Имя пользователя</label>
            <input type="text" id="reg-username" placeholder="Придумайте имя" required>
        </div>
    
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="Введите email" required>
        </div>
    
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="reg-password" placeholder="Придумайте пароль" required>
        </div>
    
        <div class="form-group">
            <label>Подтвердите пароль</label>
            <input type="password" id="reg-password2" placeholder="Повторите пароль" required>
        </div>
    
        <button type="submit" class="btn-submit">Зарегистрироваться</button>
    
        <p class="auth-link">Уже есть аккаунт? <a href="login.html">Войти</a></p>
    </form>
    </div>
</div>

    <footer>
        <p>© 2026 Blog Portal. Все права защищены.</p>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
</body>
</html>
